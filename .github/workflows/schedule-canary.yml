# Minimal schedule-only workflow to verify GitHub actually queues cron for this repo.
# If this runs on schedule but weekly-playlists.yml never shows "schedule" runs, the issue is workflow-specific (e.g. environment, parsing).
# If this never runs either, the issue is repo/account-level (disabled workflow, registration, org policy).
# DEBUG: every 5 min uses Actions minutes — revert or delete after testing.

name: Schedule canary

on:
  schedule:
    # GitHub minimum interval is 5 minutes for `schedule` workflows.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: echo "canary schedule ok $(date -u +%Y-%m-%dT%H:%M:%SZ)"
