# Runs on the default branch schedule only (merge this workflow to main for cron).
# Manual runs: Actions → Weekly playlist generation → Run workflow (pick branch).
# Schedule uses UTC cron only. Times below match Europe/Amsterdam during CEST (UTC+2, ~late Mar–late Oct).
# In CET (winter, UTC+1) use 48 6 * * 1 (07:48) and 2 9 * * 1 (10:02) instead, or restore timezone-aware schedule on GitHub.

name: Weekly playlist generation

on:
  schedule:
    # Mon 07:48 Amsterdam (CEST) = 05:48 UTC — avoids minute 0 (GitHub high-load note on :00).
    - cron: "48 5 * * 1"
    # Mon 10:02 Amsterdam (CEST) = 08:02 UTC — test slot; remove when schedule is verified
    - cron: "2 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: write # setup-python pip cache

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: PlaylistGenerator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate playlists
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SOURCE_PLAYLIST_1: ${{ vars.SOURCE_PLAYLIST_1 }}
          TARGET_PLAYLIST_ID_1: ${{ vars.TARGET_PLAYLIST_ID_1 }}
          TARGET_PLAYLIST_ID_2: ${{ vars.TARGET_PLAYLIST_ID_2 }}
          TARGET_PLAYLIST_ID_3: ${{ vars.TARGET_PLAYLIST_ID_3 }}
          TARGET_PLAYLIST_ID_4: ${{ vars.TARGET_PLAYLIST_ID_4 }}
          TARGET_PLAYLIST_ID_5: ${{ vars.TARGET_PLAYLIST_ID_5 }}
        run: python generate.py
