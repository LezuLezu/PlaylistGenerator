# Runs on the default branch schedule only (merge this workflow to main for cron).
# Manual runs: Actions → Weekly playlist generation → Run workflow (pick branch).

name: Weekly playlist generation

on:
  schedule:
    - cron: "0 8 * * 1"
      timezone: "Europe/Amsterdam"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate playlists
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          # Test prefix so VasioVibes_* weekday lists are not touched.
          PLAYLIST_PREFIX: VasioVibesAuto
          SOURCE_PLAYLIST_1: ${{ vars.SOURCE_PLAYLIST_1 }}
          SOURCE_PLAYLIST_2: ${{ vars.SOURCE_PLAYLIST_2 }}
          SOURCE_PLAYLIST_3: ${{ vars.SOURCE_PLAYLIST_3 }}
          SOURCE_PLAYLIST_4: ${{ vars.SOURCE_PLAYLIST_4 }}
          SOURCE_PLAYLIST_5: ${{ vars.SOURCE_PLAYLIST_5 }}
        run: python generate.py
